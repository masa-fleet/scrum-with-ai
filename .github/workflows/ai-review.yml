name: 🤖 AI Review PBI

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: write
  models: read

jobs:
  review-issue:
    name: Review issue with OpenAI
    if: github.event.label.name == 'ai-review'
    runs-on: ubuntu-latest

    steps:
      - name: Allow only trusted label actions
        id: guard
        run: |
          association="${{ github.event.sender.association }}"
          echo "Sender association: ${association}"

          case "${association}" in
            OWNER|MEMBER|COLLABORATOR)
              echo "trusted=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "trusted=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Skip untrusted request
        if: steps.guard.outputs.trusted != 'true'
        run: echo "Skipping AI review for untrusted actor."

      - name: Generate AI review
        if: steps.guard.outputs.trusted == 'true'
        id: inference
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          temperature: "0.2"
          system-prompt: |
            You are an Agile product backlog quality reviewer.
            Review a GitHub issue and provide practical improvements in Japanese.
            Focus on:
            - quality of the standard sections: Goal, Background & Context, Acceptance Criteria, Additional Notes
            - clarity and completeness of each section
            - whether Acceptance Criteria contains clear WHAT outcomes
            - whether detailed HOW guidance is in Additional Notes/Comments instead of AC
            - whether expected outputs are explicit (code, document, ADR, etc.)
            Keep feedback concise and actionable.
            Always format the response with these markdown sections:
            1) 良い点
            2) 改善提案
            3) 改善後のAcceptance Criteriaサンプル
          prompt: |
            Issue Title:
            ${{ github.event.issue.title }}

            Labels:
            ${{ join(github.event.issue.labels.*.name, ', ') }}

            Issue Body:
            ${{ github.event.issue.body || '(No description provided)' }}

            Please respond with markdown using:
            1) 良い点
            2) 改善提案
            3) 改善後のAcceptance Criteriaサンプル

      - name: Post AI review comment
        if: steps.guard.outputs.trusted == 'true'
        uses: actions/github-script@v8
        env:
          AI_REVIEW_RESPONSE: ${{ steps.inference.outputs.response }}
        with:
          script: |
            const body = [
              "## 🤖 AI PBI Review",
              "",
              process.env.AI_REVIEW_RESPONSE,
              "",
              "_このレビューは `ai-review` ラベル追加をトリガーに自動生成されました。_"
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Add human-review label
        if: steps.guard.outputs.trusted == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["human-review"]
            });
