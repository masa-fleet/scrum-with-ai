name: 📋 Product Backlog Item (PBI)
description: Use this template to describe a new product backlog item for the Scrum team.
title: "[PBI] "
labels:
  - pbi
body:
  - type: markdown
    attributes:
      value: |
        ## Product Backlog Item
        Fill in the sections below to help the team — and AI assistants — quickly understand what needs to be built and why.

  - type: textarea
    id: goal
    attributes:
      label: "🎯 Goal"
      description: "What outcome should be achieved when this PBI is done? Focus on WHAT to deliver."
      placeholder: |
        e.g. Organize project members and stakeholders, then save the result under /docs/project.
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: "📖 Background & Context"
      description: "Why is this needed now? Explain the problem, impact, and any useful links/context."
      placeholder: |
        e.g. Team roles are unclear at project start, causing slow decisions and handoff confusion.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "✅ Acceptance Criteria"
      description: "List observable done conditions as a simple checklist."
      placeholder: |
        - [ ] Members are organized by role and company.
        - [ ] Stakeholders are organized by role and level of involvement.
        - [ ] The final output is saved in the agreed repository location.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "📝 Additional Notes"
      description: "Optional: technical hints, design constraints, dependencies, or anything useful for AI-assisted planning."
      placeholder: "e.g. related PRs, API constraints, performance requirements, etc."
    validations:
      required: false
